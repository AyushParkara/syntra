name: Feature request
description: Suggest an improvement or missing capability for Syntra.
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Syntra do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI / UX
        - Model routing
        - Providers / keys
        - Tools / MCP
        - Safety / permissions
        - Docs
        - Other
